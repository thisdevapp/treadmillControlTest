name: sleep_prototype
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Database & Persistence
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.2
  
  # Charts & UI
  fl_chart: ^0.71.0
  intl: ^0.20.2
  rxdart: ^0.28.0 # 스트림 통합을 위해 추가
  
  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.2
  
  # Serialization
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation
  drift_dev: ^2.20.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true

  fonts:
    - family: NanumGothic
      fonts:
        - asset: assets/fonts/NanumGothicLight.ttf
          weight: 300
        - asset: assets/fonts/NanumGothic.ttf
          weight: 400
        - asset: assets/fonts/NanumGothicBold.ttf
          weight: 700
        - asset: assets/fonts/NanumGothicExtraBold.ttf
          weight: 800
